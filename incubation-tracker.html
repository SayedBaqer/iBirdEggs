<script>
var _swReg=null;
function showUpdateBar(){
  document.getElementById('updateBar').style.display='flex';
}
function trackInstalling(sw){
  sw.addEventListener('statechange',function(){
    if(sw.state==='installed'&&navigator.serviceWorker.controller) showUpdateBar();
  });
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(function(reg){
    _swReg=reg;
    if(reg.waiting&&navigator.serviceWorker.controller) showUpdateBar();
    if(reg.installing) trackInstalling(reg.installing);
    reg.addEventListener('updatefound',function(){ trackInstalling(reg.installing); });
    // Re-check every time the user switches back to the app
    document.addEventListener('visibilitychange',function(){
      if(document.visibilityState==='visible') reg.update();
    });
    // Force an immediate check so returning users always get the latest
    reg.update();
  });
}
function applyUpdate(){
  document.getElementById('updateBar').style.display='none';
  var doReload=function(){ window.location.reload(); };
  if('serviceWorker' in navigator){
    navigator.serviceWorker.addEventListener('controllerchange',doReload);
    (_swReg&&_swReg.waiting
      ? Promise.resolve(_swReg)
      : navigator.serviceWorker.ready
    ).then(function(reg){
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
      else doReload();
    });
  } else { doReload(); }
}
</script>

<style>
  :root{
    --bg:#16110c; --bg2:#1f1812; --panel:#241c14; --shell:#f3e9d6; --shell-ink:#2a2118;
    --ink:#efe3cf; --muted:#a99a83; --line:#3a2e22;
    --heat:#f0a02a; --heat-d:#c97c14; --water:#3fb6ac; --water-d:#2c8c84;
    --ok:#7bbf6a; --fast:#e7724a; --slow:#5aa9d6;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);height:100%;width:100%;overflow:hidden;}
  body{position:fixed;inset:0;width:100%;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);-webkit-font-smoothing:antialiased;overscroll-behavior:none;touch-action:pan-y;}
  [dir=rtl]{font-family:var(--sans);}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px calc(48px + env(safe-area-inset-bottom));height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  header{padding:18px 0 14px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 72%,rgba(22,17,12,0));z-index:30;}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .glyph{width:44px;height:44px;flex:none;}
  h1{font-size:18px;letter-spacing:.16em;font-weight:700;margin:0;text-transform:uppercase;}
  [dir=rtl] h1{letter-spacing:0;}
  .tag{font-size:10.5px;letter-spacing:.30em;color:var(--heat);text-transform:uppercase;margin-top:2px;font-weight:600;}
  [dir=rtl] .tag{letter-spacing:0;}
  .toggles{display:flex;gap:7px;flex:none;}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:9px;height:42px;min-width:42px;padding:0 11px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;}
  .chip.on{color:var(--heat);border-color:var(--heat-d);}
  .sub{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5;}

  .summary{display:flex;gap:8px;margin:16px 0 4px;}
  .sumcard{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 12px;}
  .sumcard .n{font-family:var(--mono);font-size:23px;font-weight:600;line-height:1;}
  .sumcard .l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
  [dir=rtl] .sumcard .l{letter-spacing:0;}
  .sumcard.alert .n{color:var(--fast);}

  button{font-family:var(--sans);cursor:pointer;border:none;}
  .row-actions{display:flex;gap:9px;margin:16px 0 6px;flex-wrap:wrap;}
  .btn{background:var(--heat);color:#251603;font-weight:700;border-radius:11px;padding:13px 16px;font-size:14px;flex:1;display:flex;align-items:center;justify-content:center;gap:7px;}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600;flex:none;padding:13px 14px;}

  .egg{background:var(--shell);color:var(--shell-ink);border-radius:16px;padding:15px 16px;margin:11px 0;position:relative;overflow:hidden;}
  .egg:active{filter:brightness(.97);}
  .egg .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .egg .name{font-size:16px;font-weight:700;}
  .egg .sp{font-size:11.5px;color:#8a7a5f;margin-top:2px;}
  .pill{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:999px;white-space:nowrap;flex:none;}
  [dir=rtl] .pill{letter-spacing:0;}
  .pill.ok{background:rgba(123,191,106,.18);color:#3f7a31;}
  .pill.fast{background:rgba(231,114,74,.16);color:#b0431f;}
  .pill.slow{background:rgba(90,169,214,.16);color:#2a6c93;}
  .pill.wait{background:rgba(170,154,131,.18);color:#7a6a51;}
  .egg .metaline{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
  .egg .metaline .m{font-size:11px;color:#7c6c52;}
  .egg .metaline .m b{display:block;font-family:var(--mono);font-size:15px;color:var(--shell-ink);font-weight:600;margin-top:1px;}
  .egg .due{font-size:11px;font-weight:700;color:#b0431f;display:flex;align-items:center;gap:5px;justify-content:flex-end;text-align:end;}
  .egg .due.future{color:#8a7a5f;font-weight:600;}
  .egg .prog{height:5px;border-radius:3px;background:rgba(42,33,24,.12);margin-top:11px;overflow:hidden;}
  .egg .prog i{display:block;height:100%;background:var(--heat-d);border-radius:3px;}

  .empty{border:1px dashed var(--line);border-radius:16px;padding:34px 20px;text-align:center;color:var(--muted);margin-top:18px;}
  .empty b{color:var(--ink);display:block;font-size:15px;margin-bottom:6px;}

  /* fullscreen overlays */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:60;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none;}
  .screen.open{display:block;}
  .swrap{max-width:680px;margin:0 auto;padding:0 16px calc(44px + env(safe-area-inset-bottom));}
  .shead{position:sticky;top:0;background:var(--bg);padding:calc(16px + env(safe-area-inset-top)) 0 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);z-index:5;}
  .back{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;width:44px;height:44px;font-size:20px;flex:none;}
  [dir=rtl] .back{transform:scaleX(-1);}
  .stitle{flex:1;min-width:0;}
  .stitle h2{margin:0;font-size:18px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stitle .sp{font-size:12px;color:var(--muted);margin-top:2px;}
  .iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:11px;width:44px;height:44px;font-size:16px;flex:none;}

  .verdict{border-radius:16px;padding:16px;margin:16px 0;border:1px solid var(--line);background:var(--panel);}
  .verdict .big{font-size:15px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .verdict .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .verdict .act{font-size:13.5px;margin-top:9px;line-height:1.55;color:var(--ink);}
  .verdict .act b{font-weight:700;}
  .verdict .temp{font-size:12.5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);line-height:1.5;}
  .verdict .temp b{color:var(--ink);}
  .v-ok{border-color:rgba(123,191,106,.4);} .v-ok .dot{background:var(--ok);} .v-ok .big{color:var(--ok);}
  .v-fast{border-color:rgba(231,114,74,.45);} .v-fast .dot{background:var(--fast);} .v-fast .big{color:var(--fast);}
  .v-slow{border-color:rgba(90,169,214,.45);} .v-slow .dot{background:var(--slow);} .v-slow .big{color:var(--slow);}
  .v-wait{border-color:var(--line);} .v-wait .dot{background:var(--muted);} .v-wait .big{color:var(--muted);}

  .chartcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 12px 6px;margin:14px 0;}
  .chart-h{padding:0 4px 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  [dir=rtl] .chart-h{letter-spacing:0;}
  .legend{display:flex;gap:13px;flex-wrap:wrap;padding:8px 4px 4px;}
  .legend span{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .legend i{width:13px;height:3px;border-radius:2px;display:inline-block;}
  .legend i.band{height:9px;border-radius:2px;}
  canvas{width:100%;display:block;direction:ltr;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 13px;}
  .stat .l{font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}
  [dir=rtl] .stat .l{letter-spacing:0;}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:5px;}
  .stat .v small{font-size:12px;color:var(--muted);font-weight:500;}
  .stat.heat .v{color:var(--heat);} .stat.water .v{color:var(--water);}

  .sectionlabel{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 4px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  [dir=rtl] .sectionlabel{letter-spacing:0;}
  .sectionlabel .acts{display:flex;gap:14px;}
  .sectionlabel button{background:none;color:var(--heat);font-size:12px;font-weight:700;text-transform:none;letter-spacing:0;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:right;padding:6px 8px;font-weight:600;}
  [dir=rtl] th{letter-spacing:0;}
  th.l,td.l{text-align:left;}
  [dir=rtl] th{text-align:left;} [dir=rtl] th.l{text-align:right;}
  [dir=rtl] td{text-align:left;} [dir=rtl] td.l{text-align:right;}
  td{padding:9px 8px;border-top:1px solid var(--line);font-family:var(--mono);text-align:right;font-size:13px;}
  td.l{font-family:var(--sans);}
  .dev.up{color:var(--fast);} .dev.down{color:var(--slow);} .dev.on{color:var(--ok);}
  .delrow{color:var(--fast);background:none;font-size:20px;padding:4px 6px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;}
  .timeline{font-size:12.5px;color:var(--muted);line-height:1.85;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;}
  .timeline b{color:var(--ink);font-family:var(--mono);}

  .modal{position:fixed;inset:0;background:rgba(8,5,2,.72);z-index:80;display:none;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .sheet{position:relative;background:var(--bg2);width:100%;max-width:680px;border-radius:20px 20px 0 0;border-top:1px solid var(--line);padding:8px 18px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .grab{width:38px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 14px;}
  .sheetclose{position:absolute;top:10px;inset-inline-end:10px;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:50%;width:40px;height:40px;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:1;}
  .sheet h3{margin:0 0 4px;font-size:17px;}
  .sheet .hint{font-size:12px;color:var(--muted);margin:0 0 14px;line-height:1.5;}
  label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:13px 0 6px;}
  [dir=rtl] label{letter-spacing:0;}
  input,select,textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:13px;font-size:16px;font-family:var(--sans);}
  input[type=number]{font-family:var(--mono);}
  .two{display:flex;gap:10px;} .two>div{flex:1;}
  .stepper{display:flex;align-items:center;gap:3px;width:100%;}
  .stepper .sbtn{width:34px;height:36px;min-width:34px;flex:none;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:20px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;}
  .stepper input{flex:1;min-width:0;text-align:center;pointer-events:none;cursor:default;}
  .seg{display:flex;gap:6px;margin-top:6px;}
  .seg button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:11px 6px;font-size:13px;font-weight:600;}
  .seg button.on{background:var(--heat);color:#251603;border-color:var(--heat);}
  .savebtn{width:100%;background:var(--heat);color:#251603;font-weight:800;border-radius:12px;padding:15px;font-size:15px;margin-top:20px;}
  .delbtn{width:100%;background:transparent;border:1px solid rgba(231,114,74,.5);color:var(--fast);border-radius:12px;padding:13px;font-weight:700;margin-top:10px;}
  .toast{position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--shell);color:var(--shell-ink);padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:120;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .foot{text-align:center;font-size:11px;color:#6b5e49;margin-top:26px;line-height:1.6;}

  /* info page */
  .info h3{font-size:15px;margin:24px 0 8px;color:var(--heat);}
  .info p{font-size:13.5px;line-height:1.65;color:var(--ink);margin:0 0 11px;}
  .info ul{margin:0 0 12px;padding-inline-start:20px;}
  .info li{font-size:13.5px;line-height:1.6;color:var(--ink);margin-bottom:7px;}
  .info .note{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--muted);line-height:1.6;margin:6px 0 12px;}
  .info b{color:var(--ink);}
  .srctable{width:100%;border-collapse:collapse;margin-top:6px;}
  .srctable td{font-family:var(--sans);border-top:1px solid var(--line);padding:10px 6px;font-size:12.5px;text-align:left;vertical-align:top;}
  [dir=rtl] .srctable td{text-align:right;}
  .srctable a{color:var(--water);word-break:break-word;}
  .ref{display:inline-block;min-width:22px;color:var(--heat);font-weight:700;font-family:var(--mono);}
  .set-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
  .set-btn{padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;text-align:center;}
  .lang-btn{padding:11px 14px;border-radius:12px;border:2px solid var(--line);background:var(--panel);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;}
  .lang-active{border-color:var(--heat);background:var(--heat);color:#1a0e00;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="toprow">
      <div class="brand">
        <div class="glyph"><a href="https://www.instagram.com/ibirds" target="_blank" rel="noopener"><img id="appLogo" width="44" height="44" style="display:block"></a></div>
        <div><h1 id="t_tag"></h1><div class="tag">by iBird</div></div>
      </div>
      <div class="toggles">
        <button class="chip" onclick="openIncList()" id="incBtn">📦</button>
        <button class="chip" onclick="openInfo()" id="infoBtn">ⓘ</button>
        <button class="chip" onclick="openSettings()" id="settingsBtn">⚙️</button>
      </div>
    </div>
    <p class="sub" id="t_sub"></p>
  </header>

  <div class="summary">
    <div class="sumcard"><div class="n" id="sumActive">0</div><div class="l" id="t_sumActive"></div></div>
    <div class="sumcard alert"><div class="n" id="sumAlert">0</div><div class="l" id="t_sumAlert"></div></div>
    <div class="sumcard"><div class="n" id="sumDue">0</div><div class="l" id="t_sumDue"></div></div>
  </div>

  <div class="row-actions">
    <button class="btn" onclick="openEgg()"><span style="font-size:17px;line-height:0">＋</span> <span id="t_newegg"></span></button>
  </div>

  <div id="list"></div>
</div>

<!-- DETAIL -->
<div class="screen" id="detail">
  <div class="swrap">
    <div class="shead">
      <button class="back" onclick="closeDetail()">‹</button>
      <div class="stitle"><h2 id="dName">—</h2><div class="sp" id="dSp">—</div></div>
      <button class="iconbtn" onclick="shareEgg()" title="Share">⤴</button>
      <button class="iconbtn" onclick="cloneEgg(currentId)" title="Clone egg"><svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="9" height="9" rx="1.8"/><path d="M2 11.5V2h9.5"/></svg></button>
      <button class="iconbtn" onclick="openEgg(currentId)" title="Edit">✎</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- INFO -->
<div class="screen" id="infoScreen">
  <div class="swrap">
    <div class="shead">
      <button class="back" onclick="closeInfo()">‹</button>
      <div class="stitle"><h2 id="t_infoTitle">—</h2></div>
    </div>
    <div class="info" id="infoBody"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="settingsScreen">
  <div class="swrap">
    <div class="shead">
      <button class="back" onclick="closeSettings()">‹</button>
      <div class="stitle"><h2 id="t_settingsTitle">—</h2></div>
    </div>
    <div id="settingsBody" class="info"></div>
  </div>
</div>

<!-- INCUBATORS LIST -->
<div class="screen" id="incScreen">
  <div class="swrap">
    <div class="shead">
      <button class="back" onclick="closeIncList()">‹</button>
      <div class="stitle"><h2 id="t_incTitle">—</h2></div>
      <button class="iconbtn" onclick="openIncModal()" title="Add">＋</button>
    </div>
    <div id="incList"></div>
  </div>
</div>

<!-- INCUBATOR DETAIL -->
<div class="screen" id="incDetail">
  <div class="swrap">
    <div class="shead">
      <button class="back" onclick="closeIncDetail()">‹</button>
      <div class="stitle"><h2 id="idName">—</h2><div class="sp" id="idSp">—</div></div>
      <button class="iconbtn" onclick="openIncModal(currentIncId)" title="Edit">✎</button>
    </div>
    <div id="incDetailBody"></div>
  </div>
</div>

<!-- INCUBATOR MODAL -->
<div class="modal" id="incModal">
  <div class="sheet">
    <button class="sheetclose" onclick="closeModal('incModal')">✕</button>
    <div class="grab"></div>
    <h3 id="incModalTitle">—</h3>
    <label id="l_incName"></label><input id="fi_name">
    <div class="two">
      <div><label id="l_incTemp"></label><div class="stepper"><button class="sbtn" onclick="stepVal('fi_temp',-0.1,35,40)">−</button><input id="fi_temp" value="37.5" readonly><button class="sbtn" onclick="stepVal('fi_temp',0.1,35,40)">+</button></div></div>
      <div><label id="l_incRh"></label><div class="stepper"><button class="sbtn" onclick="stepVal('fi_rh',-1,20,95)">−</button><input id="fi_rh" value="45" readonly><button class="sbtn" onclick="stepVal('fi_rh',1,20,95)">+</button></div></div>
    </div>
    <label id="l_turnType"></label>
    <div class="seg" id="turnSeg">
      <button data-tt="auto360" onclick="setTurnType('auto360')"></button>
      <button data-tt="manual180" onclick="setTurnType('manual180')"></button>
      <button data-tt="manual45" onclick="setTurnType('manual45')"></button>
    </div>
    <p class="hint" id="turnHint" style="margin-top:10px"></p>
    <button class="savebtn" onclick="saveInc()" id="t_saveInc"></button>
    <button class="delbtn" id="incDelBtn" style="display:none" onclick="deleteInc()"></button>
  </div>
</div>

<!-- EGG MODAL -->
<div class="modal" id="eggModal">
  <div class="sheet">
    <button class="sheetclose" onclick="closeModal('eggModal')">✕</button>
    <div class="grab"></div>
    <h3 id="eggModalTitle">—</h3>
    <p class="hint" id="t_eggHint"></p>
    <label id="l_name"></label><input id="f_name">
    <label id="l_species"></label>
    <select id="f_species" onchange="applySpecies()"></select>
    <div class="two">
      <div><label id="l_fresh"></label><input id="f_fresh" type="text" inputmode="decimal" placeholder="16.0" onclick="this.dataset.prev=this.value;this.value=''"></div>
      <div><label id="l_date"></label><input id="f_date" type="date"></div>
    </div>
    <div class="two">
      <div><label id="l_days"></label><input id="f_days" type="number" step="1" inputmode="numeric"></div>
      <div><label id="l_target"></label><input id="f_target" type="number" step="0.5" inputmode="decimal"></div>
    </div>
    <div class="two">
      <div><label id="l_pip"></label><input id="f_pip" type="number" step="1" inputmode="numeric"></div>
      <div><label id="l_temp"></label><div class="stepper"><button class="sbtn" onclick="stepVal('f_temp',-0.1,35,40)">−</button><input id="f_temp" value="37.5" readonly><button class="sbtn" onclick="stepVal('f_temp',0.1,35,40)">+</button></div></div>
    </div>
    <label id="l_targetRH"></label><div class="stepper"><button class="sbtn" onclick="stepVal('f_targetRH',-1,20,95)">−</button><input id="f_targetRH" value="45" readonly><button class="sbtn" onclick="stepVal('f_targetRH',1,20,95)">+</button></div>
    <label id="l_hatcherMode"></label>
    <div class="seg" id="hatcherSeg">
      <button data-v="separate" onclick="setHatcherMode('separate')"></button>
      <button data-v="same" onclick="setHatcherMode('same')"></button>
    </div>
    <p class="hint" id="hatcherHint" style="margin-top:8px"></p>
    <label id="l_incubator"></label>
    <select id="f_incubator"></select>
    <label id="l_sched"></label>
    <div class="seg" id="schedSeg">
      <button data-m="daily" onclick="setSched('daily')"></button>
      <button data-m="everyN" onclick="setSched('everyN')"></button>
      <button data-m="specific" onclick="setSched('specific')"></button>
    </div>
    <div id="schedExtra" style="margin-top:10px"></div>
    <p class="hint" id="rhHint" style="margin-top:13px"></p>
    <button class="savebtn" onclick="saveEgg()" id="t_saveEgg"></button>
    <button class="delbtn" id="eggDelBtn" style="display:none" onclick="deleteEgg()"></button>
  </div>
</div>

<!-- MEASURE MODAL -->
<div class="modal" id="measModal">
  <div class="sheet">
    <button class="sheetclose" onclick="closeModal('measModal')">✕</button>
    <div class="grab"></div>
    <h3 id="t_measTitle"></h3>
    <p class="hint" id="measHint"></p>
    <div class="two">
      <div><label id="l_mweight"></label><div class="stepper"><button class="sbtn" onclick="stepVal('m_weight',-0.1,0,null)">−</button><input id="m_weight" type="text" inputmode="decimal" onclick="this.dataset.prev=this.value;this.value=''" style="pointer-events:auto;cursor:text;text-align:center"><button class="sbtn" onclick="stepVal('m_weight',0.1,0,null)">+</button></div></div>
      <div><label id="l_mdate"></label><input id="m_date" type="date"></div>
    </div>
    <div class="two">
      <div><label id="l_mrh"></label><div class="stepper"><button class="sbtn" onclick="stepVal('m_rh',-1,20,95)">−</button><input id="m_rh" readonly><button class="sbtn" onclick="stepVal('m_rh',1,20,95)">+</button></div></div>
      <div><label id="l_mtemp"></label><div class="stepper"><button class="sbtn" onclick="stepVal('m_temp',-0.1,35,40)">−</button><input id="m_temp" readonly><button class="sbtn" onclick="stepVal('m_temp',0.1,35,40)">+</button></div></div>
    </div>
    <label id="l_mnote"></label><input id="m_note">
    <button class="savebtn" onclick="saveMeas()" id="t_saveMeas"></button>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ============ i18n ============ */

/* Heuristic settings-fit score (not a hatch-rate model): how close the incubator's
   actual temp/RH sit to this egg's own calculated ideal. */
function fitScore(e,a,inc){
  if(!inc) return null;
  const lock=a.status==="lockdown";
  const idealT=lock?a.hatcherTemp:(e.temp||37.5);
  const idealRH=lock?a.lockRH:(a.suggestedRH?a.suggestedRH.clamped:(a.lastRH!=null?a.lastRH:e.targetRH));
  let score=100-Math.abs(inc.temp-idealT)*25;
  if(idealRH!=null) score-=Math.abs(inc.rh-idealRH)*1.2;
  return Math.max(0,Math.min(100,Math.round(score)));
}
/* When eggs at very different stages share one incubator, the lockdown egg's
   65-70% RH need conflicts with the others' lower drying-stage RH — flag it. */
function stageConflict(assigned){
  if(assigned.length<2) return null;
  const analysed=assigned.map(e=>({e,a:analyse(e)}));
  const lockEggs=analysed.filter(x=>x.a.status==="lockdown");
  if(!lockEggs.length) return null;
  const others=analysed.filter(x=>x.a.status!=="lockdown");
  return others.length ? {lockEggs,others} : null;
}

/* ============ dates ============ */
function today(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseD(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtD(s){ if(!s) return "—"; return parseD(s).toLocaleDateString(isRTL()?"ar":undefined,{day:"numeric",month:"short"}); }
function addDays(s,n){ const d=parseD(s); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function dayDiff(a,b){ return Math.round((parseD(b)-parseD(a))/86400000); }

/* ============ math ============ */
function targetLossAt(e,tday){ const p=e.pip||e.days; return e.target*Math.min(Math.max(tday,0),p)/p; }
function targetWeightAt(e,tday){ return e.fresh*(1-targetLossAt(e,tday)/100); }
function lossPct(e,w){ return (e.fresh-w)/e.fresh*100; }

/* Rahn & Ar water-vapor-conductance law: loss rate (g/day) = G * vapor-pressure deficit (torr).
   G is a fixed shell property — estimated here from the egg's own logged weight/RH/temp,
   then solved in reverse for the RH that would hit the remaining target by pip. [10][11] */
function svpTorr(tC){ return 0.61078*Math.exp(17.27*tC/(tC+237.3))*7.50062; }
function estConductance(e,ms){
  let num=0,den=0;
  for(let i=1;i<ms.length;i++){
    const dt=dayDiff(ms[i-1].date,ms[i].date); if(dt<=0) continue;
    const dw=ms[i-1].weight-ms[i].weight; if(dw<=0) continue;
    const rh=(ms[i].rh!=null&&ms[i].rh!=="")?ms[i].rh:((ms[i-1].rh!=null&&ms[i-1].rh!=="")?ms[i-1].rh:null); if(rh==null) continue;
    const t=(ms[i].temp!=null&&ms[i].temp!=="")?ms[i].temp:((ms[i-1].temp!=null&&ms[i-1].temp!=="")?ms[i-1].temp:(e.temp||37.5));
    const dp=svpTorr(t)*(1-rh/100); if(dp<=0.05) continue;
    num+=dw; den+=dp*dt;
  }
  return den>0 ? num/den : null;
}
function rhForRate(G,airT,rateNeeded){
  const svp=svpTorr(airT), raw=100*(1-(rateNeeded/G)/svp);
  return {raw, clamped:Math.max(20,Math.min(85,raw))};
}

function scheduleDays(e){
  const p=e.pip||e.days, s=e.schedule||{mode:"everyN",n:3};
  let arr=[];
  if(s.mode==="daily"){ for(let d=0; d<=p; d++) arr.push(d); }
  else if(s.mode==="specific"){ arr=(s.days||[]).filter(d=>d>=0&&d<=e.days); }
  else { const n=Math.max(1,s.n||3); for(let d=0; d<=p; d+=n) arr.push(d); }
  return arr.sort((a,b)=>a-b);
}
function nextWeighDay(e){
  const ms=[...e.meas].map(m=>dayDiff(e.setDate,m.date));
  const last=ms.length?Math.max(...ms):-1;
  const elapsed=dayDiff(e.setDate,today());
  const sched=scheduleDays(e);
  const unmeasured=sched.filter(d=>d>last);
  if(!unmeasured.length) return null;
  // return next upcoming (today or future); fall back to last overdue only if all are past
  const upcoming=unmeasured.filter(d=>d>=elapsed);
  return upcoming.length ? upcoming[0] : unmeasured[unmeasured.length-1];
}

function analyse(e){
  const ms=[...e.meas].sort((a,b)=>a.date<b.date?-1:1);
  const tD=today(), elapsed=dayDiff(e.setDate,tD), p=e.pip||e.days;
  const out={elapsed,p,ms,
    hatchDate:addDays(e.setDate,e.days), pipDate:addDays(e.setDate,p),
    daysLeft:e.days-elapsed,
    targetWeightToday:targetWeightAt(e,Math.min(elapsed,p)),
    targetLossToday:targetLossAt(e,Math.min(elapsed,p)),
    dailyG:e.fresh*(e.target/100)/p, status:"wait",
    hatcherTemp:e.noHatcher?(e.temp||37.5):Math.max(36.6,(e.temp||37.5)-0.4), lockRH:67};
  const nd=nextWeighDay(e);
  out.nextDay=nd; out.nextDate=nd==null?null:addDays(e.setDate,nd);
  out.due = nd!=null && nd<=elapsed && elapsed<=p;
  if(ms.length){
    const last=ms[ms.length-1], lt=dayDiff(e.setDate,last.date);
    const aLoss=lossPct(e,last.weight), tLoss=targetLossAt(e,lt), dev=aLoss-tLoss;
    const proj = lt>0 ? aLoss/lt*p : aLoss;
    out.last=last; out.lastDay=lt; out.aLoss=aLoss; out.tLoss=tLoss; out.dev=dev; out.proj=proj;
    out.lastRH=null; out.lastTemp=null;
    for(let i=ms.length-1;i>=0;i--){ if(out.lastRH==null&&ms[i].rh!=null&&ms[i].rh!=="") out.lastRH=ms[i].rh; if(out.lastTemp==null&&ms[i].temp!=null&&ms[i].temp!=="") out.lastTemp=ms[i].temp; }
    const tol=Math.max(1.0,0.12*Math.max(tLoss,1)); out.tol=tol;
    out.lockRH = aLoss>=e.target ? 70 : (aLoss<e.target-2 ? 65 : 67);
    if(lt>=p) out.status="lockdown";
    else if(dev>tol) out.status="fast";
    else if(dev<-tol) out.status="slow";
    else out.status="ok";
    const G=estConductance(e,ms);
    if(G && out.status!=="lockdown"){
      const daysLeft2=Math.max(0.5,p-lt), remGrams=e.fresh*(e.target-aLoss)/100;
      const airTRef=out.lastTemp!=null?+out.lastTemp:(e.temp||37.5);
      out.G=G; out.suggestedRH=rhForRate(G,airTRef,remGrams/daysLeft2);
    }
  }
  return out;
}

function renderList(){
  const list=document.getElementById("list");
  let active=0,alert=0,due=0;
  if(!eggs.length){
    list.innerHTML=`<div class="empty"><b>${t("emptyT")}</b>${t("emptyB")}</div>`;
  } else {
    list.innerHTML=eggs.map(e=>{
      const a=analyse(e), cls=STC[a.status];
      if(a.elapsed<=e.days+2) active++;
      if(a.status==="fast"||a.status==="slow") alert++;
      if(a.due) due++;
      const pct=Math.max(0,Math.min(100,a.elapsed/e.days*100));
      const curW=a.last?a.last.weight.toFixed(2)+"g":"—", curL=a.last?a.aLoss.toFixed(1)+"%":"—";
      let dueLine="";
      if(a.status!=="lockdown"&&a.nextDay!=null){
        if(a.due){ const over=a.elapsed>a.nextDay; dueLine=`<div class="due">⏰ ${over?t("dueOver"):t("dueToday")}</div>`; }
        else dueLine=`<div class="due future">○ ${t("dueNext")}: ${t("day").toLowerCase()} ${a.nextDay} · [${fmtD(a.nextDate)}]</div>`;
      }
      const incName=e.incubatorId&&incubators.find(i=>i.id===e.incubatorId);
      return `<div class="egg" onclick="openDetail('${e.id}')">
        <div class="top">
          <div><div class="name">${esc(e.name||"—")}</div><div class="sp">${esc(spName(e.species))} · ${e.days}${isRTL()?"ي":"d"}</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none">
            <div style="display:flex;align-items:center;gap:6px">
              <div class="pill ${cls}">${stLabel(a.status)}</div>
              <button class="delrow" onclick="event.stopPropagation();openEgg('${e.id}')" title="${t('editTip')}" style="color:var(--water)">✎</button>
              <button class="delrow" onclick="event.stopPropagation();cloneEgg('${e.id}')" title="${t('cloneTip')}" style="color:var(--heat)">⊕</button>
              <button class="delrow" onclick="event.stopPropagation();quickDeleteEgg('${e.id}')" title="Delete">✕</button>
            </div>

function tempBlock(e,a){
  const tg=e.temp||37.5;
  let parts=[];
  if(a.status==="lockdown"||a.elapsed>=a.p){ parts.push(e.noHatcher?t("tLockSame",{h:a.hatcherTemp.toFixed(1)}):t("tLock",{h:a.hatcherTemp.toFixed(1)})); }
  else {
    if(a.lastTemp!=null){
      const d=a.lastTemp-tg;
      if(d>0.3) parts.push(t("tWarm",{m:a.lastTemp,d:d.toFixed(1)}));
      else if(d<-0.3) parts.push(t("tCool",{m:a.lastTemp,d:Math.abs(d).toFixed(1)}));
      else parts.push(t("tHold",{t:tg,m:a.lastTemp}));
    } else parts.push(t("holdTemp",{x:tg}));
    if(a.elapsed>=Math.round(e.days*0.66)) parts.push(t("tLate",{t:tg}));
  }
  return `<div class="temp">🌡 ${parts.join("<br>")}</div>`;
}
function verdictHTML(e,a){
  if(a.status==="wait"){
    return `<div class="verdict v-wait"><div class="big"><span class="dot"></span>${t("st_wait")}</div>
      <div class="act">${t("waitMsg",{w:a.targetWeightToday.toFixed(2),l:a.targetLossToday.toFixed(1)})}</div>${tempBlock(e,a)}</div>`;
  }
  if(a.status==="lockdown"){
    const msg=e.noHatcher?t("lockMsgSame",{p:a.p,rh:a.lockRH}):t("lockMsg",{p:a.p,rh:a.lockRH});
    return `<div class="verdict v-wait"><div class="big"><span class="dot"></span>${t("st_lock")}</div>
      <div class="act">${msg}</div>${tempBlock(e,a)}</div>`;
  }
  const cls="v-"+STC[a.status]; let action;
  const off=Math.abs(a.dev).toFixed(1);
  const overT=a.aLoss>=e.target?t("overTarget",{t:e.target}):"";
  if(a.status==="ok") action=t("onLine",{s:(a.dev>=0?"+":"")+a.dev.toFixed(1),p:a.proj.toFixed(1)});
  else if(a.suggestedRH){
    const rh=Math.round(a.suggestedRH.clamped), severe=a.suggestedRH.raw<20||a.suggestedRH.raw>85;
    const key=a.status==="fast"?"tooFastCalc":"tooSlowCalc", tempKey=a.status==="fast"?"severeFastTemp":"severeSlowTemp";
    action=t(key,{o:off,rh,p:a.proj.toFixed(1),t:e.target})+overT+(severe?t(tempKey):"");
  } else {
    const step=Math.max(3,Math.min(12,Math.round(Math.abs(a.dev)*1.4)));
    const severe=Math.abs(a.dev)>a.tol*2.2;
    const rhtxt=(delta)=>a.lastRH!=null?t("rhFromTo",{a:a.lastRH,b:Math.max(0,+a.lastRH+delta)}):"";
    if(a.status==="fast") action=t("tooFast",{o:off,step,rh:rhtxt(step),p:a.proj.toFixed(1),t:e.target})+overT+(severe?t("severeFastTemp"):t("fastTemp"))+t("noDataHint");
    else action=t("tooSlow",{o:off,step,rh:rhtxt(-step),p:a.proj.toFixed(1),t:e.target})+(severe?t("severeSlowTemp"):t("slowTemp"))+t("noDataHint");
  }
  return `<div class="verdict ${cls}"><div class="big"><span class="dot"></span>${stLabel(a.status)} · ${t("verdictDay",{d:a.lastDay})}</div>
    <div class="act">${action}</div>${tempBlock(e,a)}</div>`;
}

function scheduleHTML(e,a){
  const lateStart=Math.max(1,Math.min(a.p-1,Math.round(e.days*0.66))), pip=a.p, days=e.days, rh=e.targetRH||45;
  const baseTemp=(e.temp||37.5), lateTemp=(baseTemp-0.25).toFixed(1);
  const elapsed=a.elapsed;
  const stageIdx = elapsed<lateStart?0 : (elapsed<pip?1:2);

  function rhCell(stageIdx_i, planRH){
    if(stageIdx_i!==stageIdx) return `<span style="color:var(--muted)">${planRH}</span>`;
    if(a.status==="wait"||a.status==null) return `${planRH}% <span style="font-size:10.5px;color:var(--muted)">(${t("planOnly")})</span>`;
    if(a.status==="ok") return `<span style="color:var(--ok)">${planRH}% ✓</span>`;
    if(a.suggestedRH){
      const live=Math.round(a.suggestedRH.clamped), up=live>planRH, col=a.status==="fast"?"var(--fast)":"var(--slow)";
      return `<span style="color:${col}">${planRH}% → <b>${live}%</b> ${up?"▲":"▼"}</span>`;
    }
    const col=a.status==="fast"?"var(--fast)":"var(--slow)";
    return `<span style="color:${col}">${planRH}% — ${t("seeAbove")}</span>`;
  }
  function nowTag(i){ return i===stageIdx?` <span style="font-size:10px;color:var(--heat);font-weight:700">● ${t("nowBadge")}</span>`:""; }

  const lockTemp=a.hatcherTemp.toFixed(1)+"°C"+(e.noHatcher?"†":"*");
  const lockRH=`${a.lockRH}% <span style="font-size:10.5px;color:var(--muted)">(65–70%)</span>`;
  const rows=[
    [t("stageIncub")+nowTag(0), `${t("day")} 0–${lateStart-1}`, baseTemp.toFixed(1)+"°C", rhCell(0,rh)],
    [t("stageLate")+nowTag(1), `${t("day")} ${lateStart}–${pip-1}`, lateTemp+"°C*", rhCell(1,rh)],
    [t("stageLock")+nowTag(2), `${t("day")} ${pip}–${days}`, lockTemp, lockRH]
  ].map((r,i)=>`<tr${i===stageIdx?' style="background:rgba(123,191,106,.08)"':""}><td class="l">${r[0]}<div style="font-size:11px;color:var(--muted)">${r[1]}</div></td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join("");
  return `<div class="sectionlabel">${t("scheduleT")}</div>
    <table><thead><tr><th class="l">${t("stageL")}</th><th>${t("targetTemp")}</th><th>${t("rh")}</th></tr></thead><tbody>${rows}</tbody></table>
    <p class="hint" style="margin-top:8px">${t("scheduleNote")}</p>
    ${e.noHatcher?`<p class="hint" style="margin-top:6px">†${t("noHatcherNote")}</p>`:""}`;
}
function timelineHTML(e,a){

  const left=a.daysLeft>=0?t("toGo",{n:a.daysLeft}):t("overdue");
  return `<div class="timeline">
    🥚 ${t("pipLock",{d:a.p,date:fmtD(a.pipDate)})}<br>

function tableHTML(e,a){

    <tbody>${rows}</tbody></table>`;
}

/* ============ chart ============ */
function drawChart(e,a){
  const cv=document.getElementById("chart"); if(!cv) return;
  const dpr=window.devicePixelRatio||1, cssW=cv.clientWidth, cssH=220;
  cv.width=cssW*dpr; cv.height=cssH*dpr; const x=cv.getContext("2d"); x.scale(dpr,dpr);
  const W=cssW,H=cssH,pad={l:34,r:10,t:12,b:24}, p=a.p, D=e.days;
  const maxLoss=Math.max(e.target+5,(a.last?lossPct(e,a.last.weight):0)+3);
  const PX=d=>pad.l+(d/D)*(W-pad.l-pad.r), PY=v=>pad.t+(v/maxLoss)*(H-pad.t-pad.b);
  x.clearRect(0,0,W,H);
  x.strokeStyle="rgba(58,46,34,.6)"; x.fillStyle="#8a7a5f"; x.font="9px ui-monospace,monospace"; x.lineWidth=1;
  for(let v=0; v<=maxLoss; v+=5){ const y=PY(v); x.beginPath(); x.moveTo(pad.l,y); x.lineTo(W-pad.r,y); x.stroke(); x.fillText(v+"%",4,y+3); }
  const step=D>22?7:(D>14?5:3);
  for(let d=0; d<=D; d+=step){ x.fillText(d,PX(d)-3,H-8); }
  const lo=Math.max(0,e.target-3),hi=e.target+3;
  x.fillStyle="rgba(123,191,106,.16)"; x.beginPath(); x.moveTo(PX(0),PY(0)); x.lineTo(PX(p),PY(hi)); x.lineTo(PX(p),PY(lo)); x.closePath(); x.fill();
  x.setLineDash([3,3]); x.strokeStyle="rgba(63,182,172,.5)"; x.beginPath(); x.moveTo(PX(p),pad.t); x.lineTo(PX(p),H-pad.b); x.stroke();
  x.fillStyle="#3fb6ac"; x.fillText("pip",PX(p)-7,pad.t+8); x.setLineDash([]);
  if(a.elapsed>=0&&a.elapsed<=D){ x.setLineDash([2,4]); x.strokeStyle="rgba(239,227,207,.35)"; x.beginPath(); x.moveTo(PX(a.elapsed),pad.t); x.lineTo(PX(a.elapsed),H-pad.b); x.stroke(); x.setLineDash([]); }
  x.strokeStyle="#f0a02a"; x.lineWidth=2; x.beginPath(); x.moveTo(PX(0),PY(0)); x.lineTo(PX(p),PY(e.target)); x.stroke();
  const pts=a.ms.map(m=>({d:dayDiff(e.setDate,m.date),v:lossPct(e,m.weight)})).sort((u,w)=>u.d-w.d);
  if(pts.length){
    x.strokeStyle="rgba(243,233,214,.85)"; x.lineWidth=2; x.beginPath();
    pts.forEach((pt,i)=>{ const px=PX(pt.d),py=PY(pt.v); i?x.lineTo(px,py):x.moveTo(px,py); }); x.stroke();
    pts.forEach(pt=>{ x.beginPath(); x.fillStyle="#f3e9d6"; x.arc(PX(pt.d),PY(pt.v),3.4,0,7); x.fill(); x.lineWidth=1.5; x.strokeStyle="#16110c"; x.stroke(); });
  }
}

function readSched(){
  const m=schedDraft.mode, out={mode:m};
  if(m==="everyN"){ const v=parseInt((document.getElementById("f_n")||{}).value); out.n=v>0?v:3; }
  else if(m==="specific"){ const raw=(document.getElementById("f_days_list")||{}).value||""; out.days=raw.split(",").map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=0); if(!out.days.length) out.days=[0]; }

function saveEgg(){
  const fresh=parseFloat(normalizeNum(document.getElementById("f_fresh").value));
  const days=parseInt(document.getElementById("f_days").value);
  if(!fresh||fresh<=0){ toast(t("needFresh")); return; }
  if(!days||days<=0){ toast(t("needDays")); return; }
  const data={
    name:document.getElementById("f_name").value.trim(),
    species:SPECIES[+document.getElementById("f_species").value].g,
    fresh,days, setDate:document.getElementById("f_date").value||today(),
    target:parseFloat(document.getElementById("f_target").value)||15,
    pip:parseInt(document.getElementById("f_pip").value)||Math.max(1,days-3),
    temp:parseFloat(document.getElementById("f_temp").value)||37.5,
    targetRH:parseFloat(document.getElementById("f_targetRH").value)||45,
    noHatcher:hatcherDraft==="same",
    incubatorId:document.getElementById("f_incubator").value||null,
    schedule:readSched()
  };
  if(editId){ Object.assign(eggs.find(x=>x.id===editId),data); }
  else { data.id=uid(); data.meas=[]; eggs.unshift(data); }
  save(); closeModal("eggModal"); renderList();
  if(editId&&document.getElementById("detail").classList.contains("open")) openDetail(editId);
  toast(editId?t("updated"):t("added"));
}
function deleteEgg(){

  document.getElementById("detail").classList.remove("open"); document.body.style.overflow="";

}
function quickDeleteEgg(id){

}

/* ============ incubators ============ */
function openIncList(){ renderIncList(); document.getElementById("incScreen").classList.add("open"); document.body.style.overflow="hidden"; }
function closeIncList(){ document.getElementById("incScreen").classList.remove("open"); document.body.style.overflow=""; renderList(); }
function avgFit(assigned,inc){
  const scores=assigned.map(e=>fitScore(e,analyse(e),inc)).filter(s=>s!=null);
  return scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
}
function renderIncList(){
  const list=document.getElementById("incList");
  if(!incubators.length){ list.innerHTML=`<div class="empty"><b>${t("incEmptyT")}</b>${t("incEmptyB")}</div>`; return; }
  list.innerHTML=incubators.map(inc=>{
    const assigned=eggs.filter(e=>e.incubatorId===inc.id), avg=avgFit(assigned,inc);
    const cls=avg==null?"wait":(avg>=80?"ok":avg>=60?"slow":"fast");
    return `<div class="egg" onclick="openIncDetail('${inc.id}')">
      <div class="top"><div><div class="name">${esc(inc.name)}</div><div class="sp">${assigned.length} ${t("eggsWord")}</div></div>
        <div class="pill ${cls}">${avg==null?"—":avg+"%"}</div></div>
      <div class="metaline">
        <div class="m">${t("targetTemp")}<b>${inc.temp.toFixed(1)}°C</b></div>
        <div class="m">${t("rh")}<b>${inc.rh}%</b></div>
        <div class="m">${t("turnL")}<b>${turnLabel(inc.turnType)}</b></div>
      </div></div>`;
  }).join("");
}
function openIncDetail(id){ currentIncId=id; renderIncDetail(id); document.getElementById("incDetail").classList.add("open"); document.body.style.overflow="hidden"; }
function closeIncDetail(){ document.getElementById("incDetail").classList.remove("open"); document.body.style.overflow=""; renderIncList(); }
function renderIncDetail(id){
  const inc=incubators.find(x=>x.id===id); if(!inc) return;
  document.getElementById("idName").textContent=inc.name;
  document.getElementById("idSp").textContent=`${inc.temp.toFixed(1)}°C · ${inc.rh}% RH · ${turnLabel(inc.turnType)}`;
  const assigned=eggs.filter(e=>e.incubatorId===inc.id), avg=avgFit(assigned,inc);
  const rows=assigned.map(e=>{
    const a=analyse(e), fs=fitScore(e,a,inc), rhI=a.suggestedRH?Math.round(a.suggestedRH.clamped)+"%":(a.lastRH!=null?a.lastRH+"%":"—");
    return `<tr onclick="closeIncDetail();openDetail('${e.id}')" style="cursor:pointer">
      <td class="l">${esc(e.name||spName(e.species))}</td><td>${(e.temp||37.5).toFixed(1)}°C</td><td>${rhI}</td>
      <td><span class="dev ${fs==null?"":(fs>=80?"on":fs>=60?"down":"up")}">${fs==null?"—":fs+"%"}</span></td></tr>`;
  }).join("");
  const tableBlock=assigned.length?`<table><thead><tr><th class="l">${t("eggsWord")}</th><th>${t("idealTempL")}</th><th>${t("idealRhL")}</th><th>${t("matchL")}</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty"><b>${t("incNoEggs")}</b></div>`;
  const conflict=stageConflict(assigned);
  const conflictBlock=conflict?`<div class="verdict v-fast" style="margin-top:10px"><div class="big"><span class="dot"></span>${t("stageConflictT")}</div>
     <div class="act">${t("stageConflictMsg",{n:conflict.lockEggs.length,m:conflict.others.length})}</div></div>`:"";
  let turnBlock;
  if(inc.turnType!=="auto360"){
    const td=today(), cnt=(inc.turns&&inc.turns.date===td)?inc.turns.count:0;
    turnBlock=`<div class="timeline">🔄 ${isRTL()?TURN_INFO[inc.turnType].ar:TURN_INFO[inc.turnType].en}<br>${t("turnsToday")}: <b>${cnt}</b></div>
      <button class="btn" style="margin-top:10px;width:100%" onclick="logTurn('${inc.id}')">↻ ${t("logTurn")}</button>`;
  } else turnBlock=`<div class="timeline">🔄 ${isRTL()?TURN_INFO.auto360.ar:TURN_INFO.auto360.en}</div>`;
  document.getElementById("incDetailBody").innerHTML=
    `<div class="verdict v-ok"><div class="big"><span class="dot"></span>${t("avgMatch")}</div>
     <div class="act">${avg==null?t("noEggsAssigned"):t("avgMatchMsg",{p:avg})}</div></div>
     ${conflictBlock}${turnBlock}<div class="sectionlabel">${t("eggsWord")}</div>${tableBlock}`;
}
function logTurn(id){
  const inc=incubators.find(x=>x.id===id); if(!inc) return;
  const td=today(); if(!inc.turns||inc.turns.date!==td) inc.turns={date:td,count:0};
  inc.turns.count++; saveIncs(); renderIncDetail(id);
}
function fillTurnHint(tt){ document.getElementById("turnHint").innerHTML="🔄 "+(isRTL()?TURN_INFO[tt].ar:TURN_INFO[tt].en); }
function setTurnType(tt){ turnDraft=tt; document.querySelectorAll("#turnSeg button").forEach(b=>b.classList.toggle("on",b.dataset.tt===tt)); fillTurnHint(tt); }
function openIncModal(id){
  editIncId=id||null;
  document.getElementById("incModalTitle").textContent=id?t("incEdit"):t("incNew");
  if(id){
    const i=incubators.find(x=>x.id===id);
    document.getElementById("fi_name").value=i.name||"";
    document.getElementById("fi_temp").value=i.temp;
    document.getElementById("fi_rh").value=i.rh;
    turnDraft=i.turnType||"manual180";
    document.getElementById("incDelBtn").style.display="block";
  } else {
    document.getElementById("fi_name").value="";
    document.getElementById("fi_temp").value="37.5";
    document.getElementById("fi_rh").value="45";
    turnDraft="manual180";
    document.getElementById("incDelBtn").style.display="none";
  }
  setTurnType(turnDraft);
  document.getElementById("incModal").classList.add("open");
}
function saveInc(){
  const name=document.getElementById("fi_name").value.trim()||t("incNew");
  const temp=parseFloat(document.getElementById("fi_temp").value)||37.5;
  const rh=parseFloat(document.getElementById("fi_rh").value)||45;
  if(editIncId){ Object.assign(incubators.find(x=>x.id===editIncId),{name,temp,rh,turnType:turnDraft}); }
  else { incubators.unshift({id:uid(),name,temp,rh,turnType:turnDraft,turns:{date:"",count:0}}); }
  saveIncs(); closeModal("incModal"); renderIncList();
  if(editIncId&&document.getElementById("incDetail").classList.contains("open")) renderIncDetail(editIncId);
  toast(editIncId?t("incUpdated"):t("incAdded"));
}
function deleteInc(){
  if(!editIncId) return; if(!confirm(t("confirmDelInc"))) return;
  eggs.forEach(e=>{ if(e.incubatorId===editIncId) e.incubatorId=null; }); save();
  incubators=incubators.filter(i=>i.id!==editIncId); saveIncs(); closeModal("incModal");
  document.getElementById("incDetail").classList.remove("open"); document.body.style.overflow="";
  renderIncList(); toast(t("incDeleted"));
}

/* ============ measure modal ============ */
function openMeas(id,mid){
  measEggId=id; measEditId=mid||null; const e=eggs.find(x=>x.id===id), a=analyse(e);
  const m=mid?e.meas.find(x=>x.id===mid):null;
  document.getElementById("t_measTitle").textContent=mid?t("editMeas"):t("measTitle");
  document.getElementById("m_weight").value=m?m.weight:"";
  document.getElementById("m_date").value=m?m.date:today();
  document.getElementById("m_rh").value=m?(m.rh!=null?m.rh:45):(a.lastRH!=null?a.lastRH:45);
  document.getElementById("m_temp").value=m?(m.temp!=null?m.temp:37.5):(a.lastTemp!=null?a.lastTemp:(e.temp||37.5));
  document.getElementById("m_note").value=m?(m.note||""):"";
  document.getElementById("measHint").innerHTML=t("measHint",{w:a.targetWeightToday.toFixed(2),l:a.targetLossToday.toFixed(1)});
  document.getElementById("measModal").classList.add("open");
  setTimeout(()=>document.getElementById("m_weight").focus(),120);
}
function saveMeas(){
  const w=parseFloat(normalizeNum(document.getElementById("m_weight").value));
  if(!w||w<=0){ toast(t("needWeight")); return; }
  const e=eggs.find(x=>x.id===measEggId); if(!e) return;
  const rhv=document.getElementById("m_rh").value, tv=document.getElementById("m_temp").value;
  const rec={date:document.getElementById("m_date").value||today(),weight:w,
    rh:rhv===""?null:parseFloat(rhv), temp:tv===""?null:parseFloat(tv), note:document.getElementById("m_note").value.trim()};
  if(measEditId){ Object.assign(e.meas.find(x=>x.id===measEditId),rec); }
  else { rec.id=uid(); e.meas.push(rec); }
  measEditId=null; save(); closeModal("measModal"); openDetail(measEggId); toast(t("measSaved"));
}
function delMeas(eid,mid){ const e=eggs.find(x=>x.id===eid); if(!e) return; e.meas=e.meas.filter(m=>m.id!==mid); save(); openDetail(eid); }

/* ============ share & ics ============ */
function shareEgg(){
  const e=eggs.find(x=>x.id===currentId); if(!e) return; const a=analyse(e);
  const lines=[
    `🥚 ${e.name||spName(e.species)} (${spName(e.species)})`,
    `${t("day")} ${a.elapsed}/${e.days} · ${t("freshL")}: ${e.fresh}g`,
    a.last?`${t("curWeight")}: ${a.last.weight}g · ${t("lostSoFar")}: ${a.aLoss.toFixed(1)}% (${t("targetNow")} ${a.targetLossToday.toFixed(1)}%)`:`—`,
    `${stLabel(a.status)}${a.status!=="wait"&&a.status!=="lockdown"?` · ${t("nextWeigh")}: ${t("day").toLowerCase()} ${a.nextDay} (${fmtD(a.nextDate)})`:""}`,
  ];
  const txt=lines.join("\n");
  if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast(t("copied"))); }
  else toast(t("copied"));
}
function icsDate(s){ return s.replace(/-/g,""); }
function exportICS(id){
  const e=eggs.find(x=>x.id===id); if(!e) return;
  const sched=scheduleDays(e), name=(e.name||spName(e.species));
  let v=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//DryDown//Incubation//EN","CALSCALE:GREGORIAN"];
  sched.forEach(d=>{
    const date=addDays(e.setDate,d), end=addDays(date,1);
    v.push("BEGIN:VEVENT","UID:"+uid()+"@drydown","DTSTART;VALUE=DATE:"+icsDate(date),"DTEND;VALUE=DATE:"+icsDate(end),
      "SUMMARY:"+(isRTL()?"⚖ زِن: ":"⚖ Weigh: ")+name+" (d"+d+")",
      "DESCRIPTION:"+(isRTL()?"الوزن المتوقع":"Target weight")+" "+targetWeightAt(e,d).toFixed(2)+"g",
      "BEGIN:VALARM","TRIGGER:PT0S","ACTION:DISPLAY","DESCRIPTION:"+name,"END:VALARM","END:VEVENT");
  });
  // lockdown + hatch
  v.push("BEGIN:VEVENT","UID:"+uid()+"@drydown","DTSTART;VALUE=DATE:"+icsDate(addDays(e.setDate,e.pip||e.days)),
    "SUMMARY:"+(isRTL()?"🔒 الإغلاق + رطوبة 65–70٪: ":"🔒 Lockdown + RH 65–70%: ")+name,"END:VEVENT");
  v.push("BEGIN:VEVENT","UID:"+uid()+"@drydown","DTSTART;VALUE=DATE:"+icsDate(addDays(e.setDate,e.days)),
    "SUMMARY:"+(isRTL()?"🐣 الفقس المتوقع: ":"🐣 Expected hatch: ")+name,"END:VEVENT");
  v.push("END:VCALENDAR");
  download(v.join("\r\n"),"text/calendar","drydown-"+name.replace(/\s+/g,"_")+".ics"); toast(t("icsDone"));
}

/* ============ file download helper ============ */
function download(text,mime,fn){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=fn; a.click(); URL.revokeObjectURL(u); }

<h3>The idea in one line</h3>
<p>An egg loses weight only because water evaporates through the shell pores, so <b>weight loss = moisture loss</b>. You aim for a fixed total loss by the time the chick internally pips, and you steer toward it with <b>humidity</b>.</p>
<h3>The target</h3>
<p>For parrots the classic figure is <b>15% (±3%)</b> of fresh weight by internal pip [1][2]. Many altricial species sit in a 12–16% band [3]; large cockatoos can need more (e.g. Moluccan 16–20%, Eclectus 14–17%) [6].</p>
<h3>The rule you follow</h3>
<p>Draw a straight line from fresh weight (day 0) down to <i>fresh − target%</i> at pip day (≈ hatch − 3). Each weigh-in: if you've lost <b>less</b> than the line → <b>lower humidity</b> (or open a vent); if <b>more</b> → <b>raise humidity</b> [8]. Stop tracking at internal pip — loss then jumps ~5% as the chick breathes [8].</p>
<div class="note">This app computes that line for you, plots your weigh-ins on it, and converts the gap into a raise/lower-humidity instruction plus a projection of where you'll land at pip. With 2+ logged RH/temp readings it goes further: it back-calculates the egg's own water-vapor conductance (loss rate ∝ vapor-pressure deficit, per Rahn &amp; Ar [10][11]) and solves for the RH that would close the remaining gap by pip — a calculated target, not a fixed step.</div>
<h3>Does temperature need adjusting?</h3>
<p>Mostly you hold temperature steady (~37.5 °C forced-air; parrots often 37.0–37.5 °C [3]) and let humidity do the weight-loss work. But temperature has two real adjustments:</p>
<ul>
<li><b>Late incubation:</b> the embryo generates its own heat, so to keep the eggshell near 37.8 °C the machine air temp is set <b>lower from ~day 15</b> [4][5]. In simple incubators, watch for overheating in the last third.</li>
<li><b>Hatcher / lockdown:</b> drop ~0.4 °C below the incubation temp (≈1 °F) and raise humidity to 65–70% [6].</li>
</ul>
<p>Temperature also interacts with loss: run warm and the chick develops faster, hatches early, with less time for water loss; run cool and hatch lags [7]. So fix weight loss with humidity, and treat temperature as the schedule.</p>
<div class="note">⚠️ Numbers are general guidance from the sources below, not species-exact prescriptions. Calibrate your own incubator, verify at egg height, and keep records per clutch.</div>
<h3>Turning</h3>
<p>Turning stops the embryo sticking to the shell membrane. The angle that matters is <b>~43–45° from vertical, each way</b> [12][14][15] — hand-turners tilt to that point, cradle/rocker turners swing through it, roller turners rotate continuously.</p>
<p>Frequency matters more than most people expect: poultry trials show hatchability drops <b>~6.6% at 12×/day, ~15.5% at 6×/day, ~19.7% at 3×/day</b> versus a 24×/day baseline [12]. For hand-turning that means <b>5–7 times/day minimum, an odd number</b> so the egg ends each night on the side it didn't sleep on before [13][14]. Parrot-specific sources note parrot eggs are often turned even more frequently than poultry, especially in week 1 [3][7]. Always stop turning at lockdown.</p>
<h3>Sources</h3>`;

<h3>الفكرة في سطر</h3>
<p>تفقد البيضة وزنها فقط لأن الماء يتبخّر عبر مسام القشرة، أي أن <b>فقدان الوزن = فقدان الرطوبة</b>. تستهدف نسبة فقد كلية ثابتة حتى لحظة النقر الداخلي، وتوجّهها عبر <b>الرطوبة</b>.</p>
<h3>الهدف</h3>
<p>للببغاوات الرقم الكلاسيكي هو <b>15٪ (±3٪)</b> من الوزن الطازج حتى النقر الداخلي [1][2]. كثير من الأنواع غير الناضجة عند الفقس ضمن نطاق 12–16٪ [3]؛ وقد تحتاج الكوكاتو الكبيرة أكثر (مثل المولوكي 16–20٪، الإكلكتوس 14–17٪) [6].</p>
<h3>القاعدة المتّبعة</h3>
<p>ارسم خطًا مستقيمًا من الوزن الطازج (اليوم 0) نزولًا إلى <i>الطازج − نسبة الهدف٪</i> عند يوم النقر (≈ الفقس − 3). في كل وزن: إن فقدت <b>أقل</b> من الخط ← <b>اخفض الرطوبة</b> (أو افتح تهوية)؛ وإن فقدت <b>أكثر</b> ← <b>ارفع الرطوبة</b> [8]. أوقف التتبّع عند النقر الداخلي — إذ يقفز الفقد ~5٪ مع تنفّس الفرخ [8].</p>
<div class="note">يحسب هذا التطبيق ذلك الخط نيابةً عنك، ويرسم أوزانك عليه، ويحوّل الفارق إلى تعليمة «ارفع/اخفض الرطوبة» مع توقّع لما ستصل إليه عند النقر. ومع تسجيل قراءتين أو أكثر للرطوبة/الحرارة، يذهب أبعد: يحسب نفاذية البيضة لبخار الماء الخاصة بها (معدل الفقد يتناسب مع فارق ضغط البخار، حسب Rahn و Ar [10][11])، ويحل المعادلة لإيجاد الرطوبة التي تُغلق الفارق المتبقي عند النقر — هدف محسوب لا خطوة ثابتة.</div>
<h3>هل تحتاج الحرارة إلى ضبط؟</h3>
<p>غالبًا تُبقي الحرارة ثابتة (~37.5°م للهواء القسري؛ الببغاوات غالبًا 37.0–37.5°م [3]) وتترك الرطوبة تؤدي عمل الفقد. لكن للحرارة ضبطان حقيقيان:</p>
<ul>
<li><b>أواخر التحضين:</b> يولّد الجنين حرارته الخاصة، لذا لإبقاء قشرة البيضة قرب 37.8°م تُضبط حرارة هواء الجهاز <b>أخفض من اليوم ~15</b> [4][5]. في الحاضنات البسيطة، احذر فرط التسخين في الثلث الأخير.</li>
<li><b>الفقّاسة / الإغلاق:</b> اخفض ~0.4°م عن حرارة التحضين (≈1°ف) وارفع الرطوبة إلى 65–70٪ [6].</li>
</ul>
<p>تتفاعل الحرارة مع الفقد: الحرارة المرتفعة تُسرّع النمو وتُبكّر الفقس بوقت أقل لفقد الماء؛ والمنخفضة تؤخّره [7]. لذا اضبط الفقد بالرطوبة، واعتبر الحرارة جدولًا زمنيًا.</p>
<div class="note">⚠️ الأرقام إرشاد عام من المصادر أدناه، وليست وصفة دقيقة لكل نوع. عايِر حاضنتك، وتحقّق عند مستوى البيض، واحتفظ بسجلات لكل وجبة بيض.</div>
<h3>التقليب</h3>
<p>التقليب يمنع التصاق الجنين بغشاء القشرة. الزاوية المهمة هي <b>~43–45° عن الوضع الرأسي لكل جهة</b> [12][14][15] — المُقلِّب اليدوي يميل إلى تلك النقطة، والمُقلِّب الأرجوحي يتمايل خلالها، والمُدوِّر الأسطواني يدور باستمرار.</p>
<p>التكرار أهم مما يتوقّع كثيرون: تجارب الدواجن تُظهر أن الفقس ينخفض <b>~6.6٪ عند 12 مرة/يوم، ~15.5٪ عند 6 مرات/يوم، ~19.7٪ عند 3 مرات/يوم</b> مقارنة بأساس 24 مرة/يوم [12]. للتقليب اليدوي يعني ذلك <b>5–7 مرات/يوم كحد أدنى، بعدد فردي</b> لتنتهي البيضة كل ليلة على جانب مختلف عن الليلة السابقة [13][14]. مصادر خاصة بالببغاوات تذكر أن بيضها يُقلَّب أحيانًا أكثر من الدواجن، خصوصًا في الأسبوع الأول [3][7]. يتوقف التقليب دائمًا عند الإغلاق.</p>
<h3>المصادر</h3>`;

let tourIdx=0;
function openTour(){

function tourStep(d){
  const steps=TOUR_STEPS[lang]||TOUR_STEPS.en;
  const next=tourIdx+d;
  if(tourIdx===-1&&d===1){tourIdx=0;renderTourStep();return;}
  if(next<0||next>=steps.length) return;
  tourIdx=next;
  renderTourStep();
}
function setTourLang(l){
  lang=l; localStorage.setItem("drydown.lang",l); paintChrome(); renderList(); renderTourStep();
}
function renderTourStep(){
  const steps=TOUR_STEPS[lang]||TOUR_STEPS.en;
  // Language picker step
  if(tourIdx===-1){
    document.getElementById("tourIcon").textContent="🌐";
    document.getElementById("tourTitle").textContent=t("tourLangTitle");
    document.getElementById("tourBody").innerHTML=t("tourLangBody");
    const ex=document.getElementById("tourExample");
    ex.style.display="block";
    ex.innerHTML=`<div style="display:flex;gap:10px;margin-top:4px">
      <button onclick="setTourLang('en')" style="flex:1;padding:12px;border-radius:12px;border:2px solid ${lang==='en'?'var(--heat)':'var(--line)'};background:${lang==='en'?'var(--heat)':'var(--panel)'};color:${lang==='en'?'#1a0e00':'var(--ink)'};font-size:15px;font-weight:700;cursor:pointer">🇬🇧 English</button>
      <button onclick="setTourLang('ar')" style="flex:1;padding:12px;border-radius:12px;border:2px solid ${lang==='ar'?'var(--heat)':'var(--line)'};background:${lang==='ar'?'var(--heat)':'var(--panel)'};color:${lang==='ar'?'#1a0e00':'var(--ink)'};font-size:15px;font-weight:700;cursor:pointer">🇸🇦 عربي</button>
    </div>`;
    document.getElementById("tourDots").innerHTML="";
    document.getElementById("tourPrevBtn").style.display="none";
    const nb=document.getElementById("tourNextBtn"); nb.textContent=t("tourNext"); nb.onclick=()=>tourStep(1);
    document.getElementById("tourSkipBtn").textContent=t("tourSkip"); document.getElementById("tourSkipBtn").style.display="block";
    return;
  }
  const s=steps[tourIdx];
  const last=tourIdx===steps.length-1;
  document.getElementById("tourIcon").textContent=s.icon;
  document.getElementById("tourTitle").textContent=s.title;
  document.getElementById("tourBody").innerHTML=s.body;
  const ex=document.getElementById("tourExample");
  if(s.ex){ex.innerHTML=s.ex;ex.style.display="block";}else{ex.style.display="none";}
  const dots=steps.map((_,i)=>`<div style="width:${i===tourIdx?20:6}px;height:6px;border-radius:3px;transition:width .2s;background:${i===tourIdx?"var(--heat)":"var(--line)"}"></div>`).join("");
  document.getElementById("tourDots").innerHTML=dots;
  const prevBtn=document.getElementById("tourPrevBtn");
  prevBtn.textContent=t("tourPrev"); prevBtn.style.display=tourIdx===0?"none":"block";
  const nextBtn=document.getElementById("tourNextBtn");
  nextBtn.textContent=last?t("tourDone"):t("tourNext"); nextBtn.onclick=last?closeTour:()=>tourStep(1);
  const skipBtn=document.getElementById("tourSkipBtn");
  skipBtn.textContent=t("tourSkip"); skipBtn.style.display=last?"none":"block";
}

/* ============ export / import ============ */
function exportData(){
  const out={v:1,exportedAt:new Date().toISOString(),eggs:eggs,incubators:incubators};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="eggs-track-"+today()+".json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=function(){
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);
        const inEggs=Array.isArray(d.eggs)?d.eggs:[];
        const inIncs=Array.isArray(d.incubators)?d.incubators:[];
        if(!inEggs.length&&!inIncs.length){alert("No data found in file.");return;}
        const existIds=new Set(eggs.map(e=>e.id));
        const existIncIds=new Set(incubators.map(i=>i.id));
        let ae=0,ai=0;
        inEggs.forEach(e=>{if(e&&e.id&&!existIds.has(e.id)){eggs.push(e);ae++;}});
        inIncs.forEach(i=>{if(i&&i.id&&!existIncIds.has(i.id)){incubators.push(i);ai++;}});
        save(); saveIncs(); renderList();
        alert(t("importedMsg",{e:ae,i:ai}));
      }catch(e){alert("Invalid file.");}
    };
    r.readAsText(f);
  };
  inp.click();
}

/* Swipe-down-to-dismiss on bottom sheets — only fires once the sheet is
   already scrolled to its top, so it never fights normal form scrolling. */
function enableSheetSwipe(sheetEl){
  let startY=null, atTop=false;
  sheetEl.addEventListener("touchstart",ev=>{ startY=ev.touches[0].clientY; atTop=sheetEl.scrollTop<=0; },{passive:true});
  sheetEl.addEventListener("touchend",ev=>{
    if(startY==null) return;
    const dy=ev.changedTouches[0].clientY-startY;
    if(atTop && dy>70 && sheetEl.scrollTop<=0){ const modal=sheetEl.closest(".modal"); if(modal) modal.classList.remove("open"); }
    startY=null;
  },{passive:true});
}
document.querySelectorAll(".sheet").forEach(enableSheetSwipe);

/* Edge-swipe-to-go-back on full-screen views — there is no browser back
   gesture once this runs as an installed standalone app. */
function enableScreenBackSwipe(screenEl,closeFn){
  let startX=null,startY=null;
  screenEl.addEventListener("touchstart",ev=>{
    const tch=ev.touches[0], near=isRTL()?tch.clientX>window.innerWidth-24:tch.clientX<24;
    if(near){ startX=tch.clientX; startY=tch.clientY; } else startX=null;
  },{passive:true});
  screenEl.addEventListener("touchend",ev=>{
    if(startX==null) return;
    const tch=ev.changedTouches[0], dx=tch.clientX-startX, dy=Math.abs(tch.clientY-startY);
    const passed=isRTL()?dx<-70:dx>70;
    if(passed && dy<60) closeFn();
    startX=null;
  },{passive:true});
}
enableScreenBackSwipe(document.getElementById("detail"),closeDetail);
enableScreenBackSwipe(document.getElementById("infoScreen"),closeInfo);
enableScreenBackSwipe(document.getElementById("settingsScreen"),closeSettings);
enableScreenBackSwipe(document.getElementById("incScreen"),closeIncList);
enableScreenBackSwipe(document.getElementById("incDetail"),closeIncDetail);

paintChrome(); renderList();
